name: Bug Report
description: Report a bug in career-ops
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we reproduce this?
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should have happened?
  - type: input
    id: os
    attributes:
      label: OS
      placeholder: "e.g., macOS 15, Ubuntu 24.04, Windows 11"
  - type: markdown
    attributes:
      value: |
        ---
        career-ops-tw 是 [santifer/career-ops](https://github.com/santifer/career-ops) 的台灣繁中 fork. 如果問題跟核心評估流程有關, 也可以參考原專案的 [discussions](https://github.com/santifer/career-ops/discussions).
